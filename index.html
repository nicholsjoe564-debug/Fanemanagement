<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fame Management</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --green: #25D366;
    --green-dark: #1aad52;
    --black: #080808;
    --dark: #111111;
    --dark2: #1A1A1A;
    --dark3: #252525;
    --white: #F5F3EE;
    --gray: #888;
    --red: #E04444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* LOGIN */
  #screen-login { align-items: center; justify-content: center; background: var(--black); position: relative; overflow: hidden; }
  #screen-login::before {
    content: 'FAME\AMGMT';
    white-space: pre;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(100px, 18vw, 200px);
    color: rgba(201,168,76,0.04);
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none; line-height: 0.85; text-align: center;
  }
  .login-box {
    background: var(--dark2); border: 1px solid rgba(201,168,76,0.2);
    padding: 48px 40px; width: min(420px, 92vw); position: relative; z-index: 1;
  }
  .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 5px; color: var(--gold); margin-bottom: 8px; }
  .login-box h1 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; color: var(--white); margin-bottom: 6px; }
  .login-box p { color: var(--gray); font-size: 14px; margin-bottom: 32px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--dark3); border: 1px solid rgba(201,168,76,0.12);
    color: var(--white); padding: 12px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
  .field textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 24px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; border: none; transition: all 0.2s; text-decoration: none;
  }
  .btn-gold { background: var(--gold); color: var(--black); }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-outline { background: transparent; color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }
  .btn-outline:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 7px 14px; font-size: 11px; }

  /* ADMIN */
  #screen-admin { flex-direction: column; background: var(--black); }
  .admin-header {
    background: var(--dark2); border-bottom: 1px solid rgba(201,168,76,0.12);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 4px; }
  .logo span { color: var(--white); }
  .admin-tabs {
    display: flex; border-bottom: 1px solid rgba(255,255,255,0.06);
    background: var(--dark); padding: 0 24px;
  }
  .tab-btn {
    background: none; border: none; color: var(--gray);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 13px 18px; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .admin-content { flex: 1; padding: 28px 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; }
  .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; }

  .link-card {
    background: var(--dark2); border: 1px solid rgba(255,255,255,0.06);
    padding: 22px; transition: border-color 0.2s;
  }
  .link-card:hover { border-color: rgba(201,168,76,0.25); }
  .celeb-name { font-family: 'Bebas Neue', sans-serif; font-size: 21px; color: var(--white); letter-spacing: 1px; }

  .wa-preview {
    background: var(--dark3); border-left: 3px solid var(--green);
    padding: 12px 14px; margin-bottom: 14px;
  }
  .wa-preview-url { font-size: 12px; color: #4FC3F7; word-break: break-all; }

  .fans-table { width: 100%; border-collapse: collapse; }
  .fans-table th {
    text-align: left; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); padding: 10px 14px; border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .fans-table td { padding: 13px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
  .fan-name-cell { display: flex; align-items: center; gap: 11px; }
  .fan-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #7A4E10);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--black);
  }

  /* CHAT */
  #screen-chat { flex-direction: column; }
  .chat-header {
    background: var(--dark2); border-bottom: 1px solid rgba(201,168,76,0.12);
    padding: 14px 18px; display: flex; align-items: center; gap: 14px;
  }
  .back-btn {
    background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--gold);
    padding: 7px 13px; cursor: pointer;
  }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 9px; max-width: 75%; }
  .msg.from-manager { margin-left: auto; flex-direction: row-reverse; }
  .msg-bubble { padding: 11px 15px; font-size: 14px; line-height: 1.55; border-radius: 8px; }
  .msg.from-fan .msg-bubble { background: var(--dark3); }
  .msg.from-manager .msg-bubble { background: rgba(201,168,76,0.13); }

  /* FAN SCREENS */
  #screen-fan-landing, #screen-fan-quiz { align-items: center; justify-content: center; background: var(--black); padding: 20px; }
  .fan-card, .quiz-card {
    background: var(--dark2); border: 1px solid rgba(201,168,76,0.18);
    width: min(460px, 94vw); padding: 44px 38px;
  }
  .quiz-q { font-family: 'Bebas Neue', sans-serif; font-size: 28px; margin-bottom: 22px; }

  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: none;
    align-items: center; justify-content: center; z-index: 200;
  }
  .modal-content {
    background: var(--dark2); padding: 32px; width: min(500px, 90%); border: 1px solid var(--gold);
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">★ FAME MANAGEMENT</div>
    <h1>Admin Portal</h1>
    <p>Manage your celebrity links and fan conversations</p>
    <div class="field"><label>Username</label><input type="text" id="login-user" value="admin"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password"></div>
    <button class="btn btn-gold btn-full" onclick="adminLogin()">Enter Dashboard →</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="screen-admin" class="screen">
  <div class="admin-header">
    <div class="logo">★ FAME <span>MGMT</span></div>
    <div>
      <button class="btn btn-outline btn-sm" onclick="showSettings()">⚙️ Settings</button>
      <button class="btn btn-outline btn-sm" onclick="showScreen('screen-login')">Sign Out</button>
    </div>
  </div>
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('links',this)">My Links</button>
    <button class="tab-btn" onclick="switchTab('fans',this)">Fans &amp; Answers</button>
  </div>
  <div class="admin-content">
    <div id="tab-links" class="tab-panel active">
      <div class="section-header">
        <div class="section-title">Celebrity Links</div>
        <button class="btn btn-gold btn-sm" onclick="openCreateModal()">+ New Link</button>
      </div>
      <div class="link-grid" id="link-grid"></div>
    </div>
    <div id="tab-fans" class="tab-panel">
      <div class="section-header"><div class="section-title">Fan Sign-ups &amp; Full Answers</div></div>
      <div id="fans-container"></div>
    </div>
  </div>
</div>

<!-- ADMIN CHAT -->
<div id="screen-chat" class="screen">
  <div class="chat-header">
    <button class="back-btn" onclick="goBackToFans()">← Back</button>
    <div class="chat-header-info">
      <div class="chat-header-name" id="chat-fan-name"></div>
      <div class="chat-header-sub" id="chat-fan-sub"></div>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <textarea id="chat-input" rows="1" placeholder="Message as management..." oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendManagerMsg();}"></textarea>
    <button class="send-btn" onclick="sendManagerMsg()">Send</button>
  </div>
</div>

<!-- FAN LANDING -->
<div id="screen-fan-landing" class="screen">
  <div class="fan-card">
    <div class="fan-celeb-name" id="fan-celeb-display"></div>
    <div class="fan-mgmt-name" id="fan-mgmt-display"></div>
    <button class="btn btn-gold btn-full" onclick="startFanQuiz()">Request Access →</button>
  </div>
</div>

<!-- FAN QUIZ -->
<div id="screen-fan-quiz" class="screen">
  <div class="quiz-card">
    <div id="quiz-body"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="modal">
  <div class="modal-content">
    <h2 style="color:var(--gold)">Account Settings</h2>
    <div class="field"><label>New Username</label><input type="text" id="new-username" value="admin"></div>
    <div class="field"><label>New Password</label><input type="password" id="new-password" placeholder="Leave empty to keep current"></div>
    <button class="btn btn-gold btn-full" onclick="saveSettings()">Save Changes</button>
    <button class="btn btn-outline btn-full" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<script>
// STATE
let currentUsername = "admin";
let currentPassword = "admin123";

let S = {
  links: [
    {
      id:'warren-zeiders', celeb:'Warren Zeiders', mgmt:'Fame Management',
      welcome:"You've been personally selected for a private fan experience.",
      slug:'warren-zeiders', status:'active',
      fans:[]
    }
  ],
  activeLinkId: null, activeFanId: null,
  fanLinkId: null, fanId: null, fanName: null,
  quizStep: 0, quizAnswers: {}
};

const QUIZ = [
  {q:"What's your full name?", type:'text', key:'name'},
  {q:"Where are you from?", type:'text', key:'location'},
  {q:"How long have you been a fan?", type:'text', key:'fanDuration'},
  {q:"What's your purpose for reaching out?", type:'text', key:'purpose'}
];

function init() {
  const hash = window.location.hash.slice(1);
  if (hash.startsWith('fan/')) {
    const slug = hash.replace('fan/','');
    const link = S.links.find(l => l.slug === slug);
    if (link) { S.fanLinkId = link.id; showFanLanding(link); return; }
  }
  showScreen('screen-login');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function adminLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (user === currentUsername && pass === currentPassword) {
    showScreen('screen-admin');
    renderFans();
  } else {
    alert('❌ Wrong credentials');
  }
}

function showSettings() {
  document.getElementById('settings-modal').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}

function saveSettings() {
  const newUser = document.getElementById('new-username').value.trim();
  const newPass = document.getElementById('new-password').value.trim();
  if (newUser) currentUsername = newUser;
  if (newPass) currentPassword = newPass;
  alert(`✅ Settings saved!\nNew login: ${currentUsername} / ${currentPassword}`);
  closeSettings();
}

function renderFans() {
  const container = document.getElementById('fans-container');
  let html = `<table class="fans-table"><thead><tr><th>Name</th><th>Location</th><th>Fan Since</th><th>Purpose</th><th></th></tr></thead><tbody>`;
  S.links.forEach(link => {
    link.fans.forEach(fan => {
      html += `<tr>
        <td><div class="fan-name-cell"><div class="fan-avatar">${fan.name[0]}</div>${fan.name}</div></td>
        <td>${fan.answers.location || '-'}</td>
        <td>${fan.answers.fanDuration || '-'}</td>
        <td>${fan.answers.purpose ? fan.answers.purpose.substring(0,50)+'...' : '-'}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openAdminChat('${link.id}','${fan.id}')">Chat</button></td>
      </tr>`;
    });
  });
  html += '</tbody></table>';
  container.innerHTML = html || '<p>No fans yet. Share your link.</p>';
}

function openAdminChat(linkId, fanId) {
  const link = S.links.find(l => l.id === linkId);
  const fan = link.fans.find(f => f.id === fanId);
  document.getElementById('chat-fan-name').textContent = fan.name;
  document.getElementById('chat-fan-sub').innerHTML = `Location: ${fan.answers.location}<br>Fan for: ${fan.answers.fanDuration}<br>Purpose: ${fan.answers.purpose}`;
  showScreen('screen-chat');
}

function sendManagerMsg() {
  alert("Message sent (demo mode)");
}

function showFanLanding(link) {
  document.getElementById('fan-celeb-display').textContent = link.celeb;
  document.getElementById('fan-mgmt-display').textContent = link.mgmt;
  showScreen('screen-fan-landing');
}

function startFanQuiz() {
  S.quizStep = 0;
  S.quizAnswers = {};
  renderQuizStep();
  showScreen('screen-fan-quiz');
}

function renderQuizStep() {
  const q = QUIZ[S.quizStep];
  const body = document.getElementById('quiz-body');
  body.innerHTML = `
    <div class="quiz-q">${q.q}</div>
    <input type="text" id="qinp" style="width:100%;padding:12px;margin:15px 0;" placeholder="Type answer...">
    <button class="btn btn-gold btn-full" onclick="nextQ()">Next →</button>
  `;
}

function nextQ() {
  const val = document.getElementById('qinp').value.trim();
  if (!val) return alert("Please answer the question");
  S.quizAnswers[QUIZ[S.quizStep].key] = val;
  if (QUIZ[S.quizStep].key === 'name') S.fanName = val;
  S.quizStep++;
  if (S.quizStep >= QUIZ.length) completeFanSignup();
  else renderQuizStep();
}

function completeFanSignup() {
  const link = S.links.find(l => l.id === S.fanLinkId);
  const fanId = 'f' + Date.now();
  const newFan = {
    id: fanId,
    name: S.fanName || 'Fan',
    answers: S.quizAnswers,
    messages: []
  };
  link.fans.push(newFan);
  alert("✅ You are now connected to management!");
  showScreen('screen-fan-chat');
}

function goBackToFans() {
  showScreen('screen-admin');
  renderFans();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='fans') renderFans();
}

init();
</script>
</body>
</html>
