<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fame Management</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --green: #25D366;
    --green-dark: #1aad52;
    --black: #080808;
    --dark: #111111;
    --dark2: #1A1A1A;
    --dark3: #252525;
    --white: #F5F3EE;
    --gray: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* LOGIN */
  #screen-login { align-items: center; justify-content: center; background: var(--black); }
  .login-box {
    background: var(--dark2); border: 1px solid rgba(201,168,76,0.2);
    padding: 48px 40px; width: min(420px, 92vw);
  }
  .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 5px; color: var(--gold); }
  .login-box h1 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .field input { width: 100%; background: var(--dark3); border: 1px solid rgba(201,168,76,0.12); color: var(--white); padding: 12px 16px; }

  .btn { padding: 13px 24px; font-weight: 600; cursor: pointer; border: none; }
  .btn-gold { background: var(--gold); color: var(--black); }
  .btn-outline { background: transparent; color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }

  /* ADMIN */
  .admin-header { background: var(--dark2); padding: 14px 24px; display: flex; justify-content: space-between; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); }
  .admin-tabs { display: flex; background: var(--dark); }
  .tab-btn { padding: 13px 20px; background: none; border: none; color: var(--gray); cursor: pointer; }
  .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

  .fans-table { width: 100%; border-collapse: collapse; }
  .fans-table th, .fans-table td { padding: 12px; border-bottom: 1px solid #333; }
  .fan-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; }

  /* CHAT */
  #screen-chat { flex-direction: column; }
  .chat-header { background: var(--dark2); padding: 14px; display: flex; align-items: center; gap: 10px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #0f0f0f; }
  .msg { margin: 10px 0; padding: 12px 16px; border-radius: 8px; max-width: 75%; }
  .msg.from-manager { background: rgba(201,168,76,0.2); margin-left: auto; }
  .msg.from-fan { background: var(--dark3); }

  /* FAN QUIZ */
  .quiz-card { background: var(--dark2); padding: 40px; max-width: 460px; margin: 20px auto; }
  .quiz-q { font-size: 26px; margin-bottom: 20px; }
  .quiz-option { padding: 14px; background: var(--dark3); margin: 8px 0; cursor: pointer; }
  .quiz-option.selected { background: rgba(201,168,76,0.2); border: 1px solid var(--gold); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">★ FAME MANAGEMENT</div>
    <h1>Admin Portal</h1>
    <p>Manage celebrity fans</p>
    <div class="field"><label>Username</label><input type="text" id="login-user" value="admin"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password"></div>
    <button class="btn btn-gold btn-full" onclick="adminLogin()">Enter Dashboard →</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="screen-admin" class="screen">
  <div class="admin-header">
    <div class="logo">★ FAME MGMT</div>
    <div>
      <button class="btn btn-outline btn-sm" onclick="showSettings()">Settings</button>
      <button class="btn btn-outline btn-sm" onclick="showScreen('screen-login')">Sign Out</button>
    </div>
  </div>
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('links',this)">My Links</button>
    <button class="tab-btn" onclick="switchTab('fans',this)">Fans &amp; Answers</button>
  </div>
  <div class="admin-content">
    <div id="tab-links" class="tab-panel active">
      <div class="section-header">
        <div class="section-title">Celebrity Links</div>
        <button class="btn btn-gold btn-sm" onclick="openCreateModal()">+ New Link</button>
      </div>
      <div id="link-grid"></div>
    </div>
    <div id="tab-fans" class="tab-panel">
      <div class="section-header"><div class="section-title">Fan Sign-ups &amp; Answers</div></div>
      <div id="fans-container"></div>
    </div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="screen-chat" class="screen">
  <div class="chat-header">
    <button onclick="goBackToFans()" class="btn btn-outline">← Back</button>
    <div>
      <strong id="chat-fan-name"></strong><br>
      <small id="chat-fan-sub"></small>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div style="padding:15px; background:var(--dark2);">
    <textarea id="chat-input" placeholder="Type message..." style="width:100%; height:80px; background:var(--dark3); color:white; border:1px solid #444; padding:10px;"></textarea>
    <button class="btn btn-gold btn-full" onclick="sendManagerMsg()" style="margin-top:8px">Send Message</button>
  </div>
</div>

<!-- FAN SCREENS -->
<div id="screen-fan-landing" class="screen">
  <div class="quiz-card">
    <h2 id="fan-celeb-display"></h2>
    <p id="fan-mgmt-display"></p>
    <button class="btn btn-gold btn-full" onclick="startFanQuiz()">Request Access →</button>
  </div>
</div>

<div id="screen-fan-quiz" class="screen">
  <div class="quiz-card">
    <div id="quiz-body"></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-modal" class="modal">
  <div class="modal-content">
    <h2>Account Settings</h2>
    <div class="field"><label>New Username</label><input id="new-username" value="admin"></div>
    <div class="field"><label>New Password</label><input type="password" id="new-password" placeholder="Leave empty to keep current"></div>
    <button class="btn btn-gold btn-full" onclick="saveSettings()">Save</button>
    <button class="btn btn-outline btn-full" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<script>
// STATE
let currentUsername = "admin";
let currentPassword = "admin123";

let S = {
  links: [{
    id: "warren-zeiders",
    celeb: "Warren Zeiders",
    mgmt: "Fame Management",
    slug: "warren-zeiders",
    fans: []
  }]
};

const QUIZ = [
  {q:"What's your full name?", key:"name", type:"text"},
  {q:"Where are you from?", key:"location", type:"text"},
  {q:"How long have you been a fan?", key:"fanDuration", type:"options", opts:["Less than a year","1–3 years","3–5 years","5+ years"]},
  {q:"What's your purpose for reaching out?", key:"purpose", type:"text"}
];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function adminLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (user === currentUsername && pass === currentPassword) {
    showScreen('screen-admin');
    renderLinks();
    renderFans();
  } else {
    alert("Wrong login");
  }
}

function renderLinks() {
  const grid = document.getElementById('link-grid');
  grid.innerHTML = S.links.map(l => `
    <div class="link-card">
      <h3>${l.celeb}</h3>
      <button class="btn btn-gold btn-sm" onclick="copyLink('${l.slug}')">Copy Shareable Link</button>
    </div>
  `).join('');
}

function copyLink(slug) {
  const url = location.href + "#fan/" + slug;
  navigator.clipboard.writeText(url);
  alert("Link copied!\n\nShare this with fans: " + url);
}

function renderFans() {
  const container = document.getElementById('fans-container');
  let html = `<table class="fans-table"><thead><tr><th>Name</th><th>Location</th><th>Fan Since</th><th>Purpose</th><th>Action</th></tr></thead><tbody>`;
  
  S.links.forEach(link => {
    link.fans.forEach(fan => {
      html += `<tr>
        <td><span class="fan-avatar">${fan.name[0]}</span> ${fan.name}</td>
        <td>${fan.answers.location || '-'}</td>
        <td>${fan.answers.fanDuration || '-'}</td>
        <td>${fan.answers.purpose || '-'}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openChat('${link.id}','${fan.id}')">💬 Chat</button></td>
      </tr>`;
    });
  });
  html += '</tbody></table>';
  container.innerHTML = html || "<p>No fans yet. Share your link.</p>";
}

function openChat(linkId, fanId) {
  const link = S.links.find(l => l.id === linkId);
  const fan = link.fans.find(f => f.id === fanId);
  document.getElementById('chat-fan-name').textContent = fan.name;
  document.getElementById('chat-fan-sub').innerHTML = `
    Location: ${fan.answers.location}<br>
    Fan Since: ${fan.answers.fanDuration}<br>
    Purpose: ${fan.answers.purpose}
  `;
  showScreen('screen-chat');
}

function sendManagerMsg() {
  const input = document.getElementById('chat-input');
  if (input.value.trim()) {
    alert("✅ Message sent to fan!\n\n(Real-time chat would need a backend)");
    input.value = '';
  }
}

function startFanQuiz() {
  S.quizStep = 0;
  S.quizAnswers = {};
  renderQuizStep();
  showScreen('screen-fan-quiz');
}

function renderQuizStep() {
  const q = QUIZ[S.quizStep];
  let html = `<div class="quiz-q">${q.q}</div>`;
  if (q.type === "options") {
    html += `<div>`;
    q.opts.forEach(opt => {
      html += `<div class="quiz-option" onclick="selectOption(this,'${opt}')">${opt}</div>`;
    });
    html += `</div>`;
  } else {
    html += `<input type="text" id="qinp" style="width:100%;padding:12px;margin:10px 0;" placeholder="Type here...">`;
  }
  html += `<button class="btn btn-gold btn-full" onclick="nextQ()">Next</button>`;
  document.getElementById('quiz-body').innerHTML = html;
}

function selectOption(el, val) {
  document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  S.quizAnswers[QUIZ[S.quizStep].key] = val;
}

function nextQ() {
  const q = QUIZ[S.quizStep];
  if (q.type === "text") {
    const val = document.getElementById('qinp').value.trim();
    if (!val) return alert("Please answer");
    S.quizAnswers[q.key] = val;
    if (q.key === "name") S.fanName = val;
  }
  S.quizStep++;
  if (S.quizStep >= QUIZ.length) completeFanSignup();
  else renderQuizStep();
}

function completeFanSignup() {
  const link = S.links[0];
  const fan = {
    id: "f" + Date.now(),
    name: S.fanName || "New Fan",
    answers: S.quizAnswers
  };
  link.fans.push(fan);
  alert("✅ Thank you! Management will contact you soon.");
  showScreen('screen-fan-landing');
}

function goBackToFans() {
  showScreen('screen-admin');
  renderFans();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'fans') renderFans();
}

function showSettings() {
  alert("Settings:\n\nCurrent login: " + currentUsername + " / " + currentPassword + "\n\nTo change, edit the code for now.");
}

init();
</script>
</body>
</html>
