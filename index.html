<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fame Management</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --green: #25D366;
    --green-dark: #1aad52;
    --black: #080808;
    --dark2: #1A1A1A;
    --dark3: #252525;
    --white: #F5F3EE;
    --gray: #888;
    --red: #E04444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* LOGIN */
  #screen-login { align-items: center; justify-content: center; background: var(--black); position: relative; }
  .login-box {
    background: var(--dark2); border: 1px solid rgba(201,168,76,0.2);
    padding: 48px 40px; width: min(420px, 92vw);
  }
  .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 5px; color: var(--gold); margin-bottom: 8px; }
  .login-box h1 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; color: var(--white); margin-bottom: 6px; }
  .login-box p { color: var(--gray); font-size: 14px; margin-bottom: 32px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--dark3); border: 1px solid rgba(201,168,76,0.12);
    color: var(--white); padding: 12px 16px; font-size: 15px;
  }

  .btn {
    padding: 13px 24px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; border: none; transition: all 0.2s;
  }
  .btn-gold { background: var(--gold); color: var(--black); }
  .btn-green { background: var(--green); color: white; }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(224,68,68,0.4); }
  .btn-full { width: 100%; }

  /* ADMIN HEADER */
  .admin-header {
    background: var(--dark2); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .notification-bell { position: relative; font-size: 24px; cursor: pointer; }
  .notification-badge {
    position: absolute; top: -6px; right: -6px; background: var(--red); color: white;
    font-size: 11px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }

  .link-card, .request-card {
    background: var(--dark2); border: 1px solid rgba(255,255,255,0.06); padding: 20px; margin-bottom: 16px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">★ FAME MANAGEMENT</div>
    <h1>Admin Portal</h1>
    <p style="color:var(--gray);">Manage your celebrity links and fan conversations</p>
    <div class="field"><label>Username</label><input type="text" id="login-user" placeholder="admin"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
    <button class="btn btn-gold btn-full" onclick="adminLogin()">Enter Dashboard →</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="screen-admin" class="screen">
  <div class="admin-header">
    <div class="logo" style="font-family:'Bebas Neue'; font-size:22px; color:var(--gold);">★ FAME <span>MGMT</span></div>
    <div style="display:flex; align-items:center; gap:20px;">
      <div class="notification-bell" onclick="renderFans()">🛎️ <span id="pending-count" class="notification-badge" style="display:none;">0</span></div>
      <button class="btn btn-outline btn-sm" onclick="showScreen('screen-login')">Sign Out</button>
    </div>
  </div>
  <div style="padding:24px">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h2 style="font-family:'Bebas Neue';">Celebrity Links</h2>
      <button class="btn btn-gold btn-sm" onclick="openCreateModal()">+ New Link</button>
    </div>
    <div id="link-grid"></div>

    <h2 style="margin:40px 0 15px; font-family:'Bebas Neue';">Fan Requests</h2>
    <div id="fans-container"></div>
  </div>
</div>

<!-- FAN LANDING -->
<div id="screen-fan-landing" class="screen">
  <div class="fan-card" style="text-align:center;">
    <div style="color:var(--gold); letter-spacing:2px;">★ OFFICIAL MANAGEMENT PORTAL</div>
    <div id="fan-celeb-display" style="font-family:'Bebas Neue'; font-size:52px; margin:20px 0;"></div>
    <div id="fan-mgmt-display" style="color:var(--gold);"></div>
    <div id="fan-welcome-text" style="margin:25px 0; line-height:1.6;"></div>
    <button class="btn btn-gold btn-full" onclick="startFanQuiz()">Request Access →</button>
  </div>
</div>

<!-- FAN QUIZ - ALL ON ONE PAGE -->
<div id="screen-fan-quiz" class="screen">
  <div class="quiz-card" style="max-width:500px; margin:40px auto;">
    <h2 style="font-family:'Bebas Neue'; text-align:center; margin-bottom:30px;">Fan Verification</h2>
    <div id="quiz-body"></div>
    <button class="btn btn-gold btn-full" onclick="submitAllAnswers()">Submit Request</button>
  </div>
</div>

<script>
// STATE
let S = JSON.parse(localStorage.getItem('fameData')) || {
  links: [
    {
      id: 'warren-zeiders',
      celeb: 'Warren Zeiders',
      mgmt: 'Fame Management',
      welcome: "You've been personally selected for a private fan experience with Warren Zeiders' official management team.",
      slug: 'warren-zeiders',
      status: 'active',
      fans: [],
      pendingFans: []
    }
  ]
};

function saveData() {
  localStorage.setItem('fameData', JSON.stringify(S));
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ADMIN LOGIN
function adminLogin() {
  if (document.getElementById('login-user').value.trim() === 'admin' && document.getElementById('login-pass').value === 'admin123') {
    renderLinks();
    renderFans();
    showScreen('screen-admin');
  } else {
    alert('❌ Wrong credentials');
  }
}

// LINKS
function renderLinks() {
  const grid = document.getElementById('link-grid');
  grid.innerHTML = S.links.map(l => {
    const url = `${location.origin}${location.pathname}#fan/${l.slug}`;
    return `<div class="link-card">
      <h3>${l.celeb}</h3>
      <p style="color:var(--gold);">${l.mgmt}</p>
      <div style="background:#222;padding:12px;font-size:13px;word-break:break-all;margin:15px 0;">${url}</div>
      <button class="btn btn-green btn-sm" onclick="copyLink('${l.slug}')">Copy Link</button>
    </div>`;
  }).join('');
}

function copyLink(slug) {
  navigator.clipboard.writeText(`${location.origin}${location.pathname}#fan/${slug}`);
  alert('✅ Link copied!');
}

// FANS
function renderFans() {
  let totalPending = 0;
  let html = '';

  S.links.forEach(link => {
    if (link.pendingFans && link.pendingFans.length > 0) {
      totalPending += link.pendingFans.length;
      html += `<h3 style="color:#ffc107;">Pending — ${link.celeb}</h3>`;
      link.pendingFans.forEach(f => {
        html += `<div class="request-card">
          <strong>${f.name}</strong><br>
          From: ${f.answers.q3 || '—'}<br>
          Fan for: ${f.answers.q1 || '—'}<br>
          Favorite: ${f.answers.q2 || '—'}<br><br>
          <button class="btn btn-green" onclick="approveFan('${link.id}','${f.id}')">✅ Approve</button>
          <button class="btn btn-danger" onclick="rejectFan('${link.id}','${f.id}')">Reject</button>
        </div>`;
      });
    }
  });

  document.getElementById('fans-container').innerHTML = html || '<p style="color:#666;text-align:center;padding:60px;">No pending requests yet.<br>Share your link.</p>';

  const badge = document.getElementById('pending-count');
  if (totalPending > 0) {
    badge.textContent = totalPending;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function approveFan(linkId, fanId) {
  const link = S.links.find(l => l.id === linkId);
  const idx = link.pendingFans.findIndex(f => f.id === fanId);
  if (idx === -1) return;

  const fan = link.pendingFans[idx];
  link.fans.push(fan);
  link.pendingFans.splice(idx, 1);
  saveData();
  renderFans();
  alert('✅ Fan approved!');
}

function rejectFan(linkId, fanId) {
  const link = S.links.find(l => l.id === linkId);
  link.pendingFans = link.pendingFans.filter(f => f.id !== fanId);
  saveData();
  renderFans();
}

// FAN QUIZ - SINGLE PAGE
const QUIZ = [
  { q: "What's your first name?", key: 'name', type: 'text' },
  { q: "How long have you been a fan?", key: 'q1', type: 'options', opts: ['Less than a year', '1–3 years', '3–5 years', '5+ years'] },
  { q: "Favorite song or project?", key: 'q2', type: 'text' },
  { q: "Where are you from?", key: 'q3', type: 'text' }
];

function startFanQuiz() {
  S.quizAnswers = {};
  renderAllQuestions();
  showScreen('screen-fan-quiz');
}

function renderAllQuestions() {
  const body = document.getElementById('quiz-body');
  let html = '';

  QUIZ.forEach((q, i) => {
    html += `<div style="margin-bottom:25px;">
      <label style="display:block;margin-bottom:8px;font-weight:600;">${q.q}</label>`;
    if (q.type === 'options') {
      q.opts.forEach(opt => {
        html += `<button class="btn btn-outline" style="width:100%;margin:6px 0;text-align:left;" onclick="selectOption(this,'${q.key}','${opt}')">${opt}</button>`;
      });
    } else {
      html += `<input type="text" id="q${i}" style="width:100%;padding:14px;background:var(--dark3);border:1px solid #444;color:white;" placeholder="Type here...">`;
    }
    html += `</div>`;
  });

  body.innerHTML = html;
}

function selectOption(el, key, val) {
  S.quizAnswers[key] = val;
  const parent = el.parentElement;
  parent.querySelectorAll('button').forEach(b => b.style.borderColor = '#444');
  el.style.borderColor = 'var(--gold)';
}

function submitAllAnswers() {
  QUIZ.forEach((q, i) => {
    if (q.type === 'text') {
      const input = document.getElementById(`q${i}`);
      if (input) S.quizAnswers[q.key] = input.value.trim();
    }
  });

  if (!S.quizAnswers.name) return alert("Please enter your name");

  const link = S.links.find(l => l.id === S.fanLinkId);
  if (!link) return;

  const fan = {
    id: 'f' + Date.now(),
    name: S.quizAnswers.name,
    answers: S.quizAnswers,
    messages: [{ from: 'system', text: 'New request received', time: now() }]
  };

  link.pendingFans.push(fan);
  saveData();

  alert('Your request has been sent to management for approval.');
  showScreen('screen-fan-landing');
}

// INIT
function init() {
  const hash = window.location.hash.slice(1);
  if (hash.startsWith('fan/')) {
    const slug = hash.replace('fan/', '');
    const link = S.links.find(l => l.slug === slug);
    if (link) {
      S.fanLinkId = link.id;
      showFanLanding(link);
      return;
    }
  }
  showScreen('screen-login');
}

function showFanLanding(link) {
  document.getElementById('fan-celeb-display').textContent = link.celeb;
  document.getElementById('fan-mgmt-display').textContent = link.mgmt;
  document.getElementById('fan-welcome-text').textContent = link.welcome;
  showScreen('screen-fan-landing');
}

init();
</script>
</body>
</html>
