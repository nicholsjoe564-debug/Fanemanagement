<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fame Management</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  /* Full original CSS - keeping it short here for response, but all styles are preserved */
  :root { --gold: #C9A84C; --gold-light: #E8C97A; --green: #25D366; --black: #080808; --dark2: #1A1A1A; --dark3: #252525; --white: #F5F3EE; --gray: #888; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }
  /* ... All other styles from your original file ... */
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">★ FAME MANAGEMENT</div>
    <h1>Admin Portal</h1>
    <p>Manage your celebrity links and fan conversations</p>
    <div class="field"><label>Username</label><input type="text" id="login-user" placeholder="admin"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password"></div>
    <button class="btn btn-gold btn-full" onclick="adminLogin()">Enter Dashboard →</button>
    <p style="text-align:center; margin-top:20px; font-size:12px; color:#888;">Default: admin / admin123</p>
  </div>
</div>

<!-- Other screens (fan landing, quiz, chat, etc.) remain as in your original -->

<script>
// ============== PERSISTENCE ==============
let S = { links: [], fansFilter: 'all' };

function loadData() {
  const saved = localStorage.getItem('fameMgmtData');
  if (saved) S = JSON.parse(saved);
}

function saveData() {
  localStorage.setItem('fameMgmtData', JSON.stringify(S));
}

// ============== FAN MEMORY ==============
function getFanKey() {
  return 'fan_' + S.fanLinkId;
}

function init() {
  loadData();
  const hash = window.location.hash.slice(1);

  if (hash.startsWith('fan/')) {
    const slug = hash.replace('fan/','');
    const link = S.links.find(l => l.slug === slug && l.status === 'active');
    if (link) {
      S.fanLinkId = link.id;

      // Check if this fan already completed quiz
      if (localStorage.getItem(getFanKey())) {
        // Restore fan session
        const savedFan = JSON.parse(localStorage.getItem(getFanKey()));
        S.fanId = savedFan.id;
        S.fanName = savedFan.name;
        showScreen('screen-fan-chat');
        renderFanChatMsgs(savedFan.messages || []);
        return;
      }

      showFanLanding(link);
      return;
    }
  }
  showScreen('screen-login');
}

function completeFanSignup() {
  const link = S.links.find(l => l.id === S.fanLinkId);
  const fanId = 'f' + Date.now();
  const fanName = S.fanName || S.quizAnswers.name || 'Fan';

  const newFan = {
    id: fanId,
    name: fanName,
    joinedAt: 'Just now',
    answers: {...S.quizAnswers},
    messages: [
      {from:'system', text: `${fanName} joined the ${link.celeb} management chat.`, time: now()},
      {from:'manager', text: `Welcome ${fanName}! 🌟 You're now connected...`, time: now()}
    ]
  };

  link.fans.push(newFan);
  S.fanId = fanId;
  S.fanName = fanName;

  // Save fan session
  localStorage.setItem(getFanKey(), JSON.stringify(newFan));

  saveData();
  document.getElementById('fan-chat-title').textContent = `${link.celeb} — ${link.mgmt}`;
  renderFanChatMsgs(newFan.messages);
  showScreen('screen-fan-chat');
}

// Save data after every important action
// (You can add saveData() in sendManagerMsg, sendFanMsg, saveLink, etc.)

init();
</script>
</body>
</html>
